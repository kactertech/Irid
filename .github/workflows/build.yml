name: Build Irid

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build in FreeBSD VM
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        mem: 8192
        run: |
          pkg install -y gmake
          make buildworld TARGET=amd64
          make buildkernel KERNCONF=GENERIC TARGET=amd64
          make release KERNCONF=GENERIC TARGET=amd64 NODOC=yes NOPORTS=yes
    
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: irid-iso
        path: /usr/obj/usr/src/amd64.amd64/release/disc1.iso
