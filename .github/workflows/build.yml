name: Build Irid

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test FreeBSD
        uses: cross-platform-actions/action@v0.25.0
        with:
          operating_system: freebsd
          version: '15.0'
          run: |
            sudo pkg install -y gmake
            make buildkernel KERNCONF=GENERIC \
            TARGET=amd64 TARGET_ARCH=amd64
