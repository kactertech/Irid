name: Build Irid OS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-irid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc g++ bsdmainutils qemu-utils

      - name: Build Irid world + kernel
        run: |
          cd Irid/Irid-src
          # Build world
          make buildworld
          # Build kernel
          make buildkernel
          # Optional: installworld do DESTDIR
          mkdir -p /tmp/irid
          make installworld DESTDIR=/tmp/irid

      - name: Archive built OS
        run: |
          cd /tmp
          tar czf irid-os.tar.gz irid
          
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: irid-os
          path: /tmp/irid-os.tar.gz
