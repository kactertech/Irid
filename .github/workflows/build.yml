name: Build Irid

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build in FreeBSD VM
      uses: vmactions/freebsd-vm@v1
      with:
        release: "15.0"
        usesh: true
        sync: rsync
        copyback: false
        prepare: pkg install -y gmake
        run: |
          pwd
          ls
          make buildkernel KERNCONF=GENERIC \
          TARGET=amd64 TARGET_ARCH=amd64
